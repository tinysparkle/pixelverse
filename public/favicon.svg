<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="32" height="32" fill="#1a1a2e"/>
  
  <!-- 像素块组成的"P"形状（代表 Pixelverse）-->
  <!-- 左边竖列 -->
  <rect x="6" y="4" width="4" height="4" fill="#00d9ff"/>
  <rect x="6" y="8" width="4" height="4" fill="#00d9ff"/>
  <rect x="6" y="12" width="4" height="4" fill="#00d9ff"/>
  <rect x="6" y="16" width="4" height="4" fill="#00d9ff"/>
  <rect x="6" y="20" width="4" height="4" fill="#00d9ff"/>
  <rect x="6" y="24" width="4" height="4" fill="#00d9ff"/>
  
  <!-- P 的上方横条 -->
  <rect x="10" y="4" width="4" height="4" fill="#00d9ff"/>
  <rect x="14" y="4" width="4" height="4" fill="#00d9ff"/>
  <rect x="10" y="8" width="4" height="4" fill="#00d9ff"/>
  
  <!-- P 的中间竖条 -->
  <rect x="18" y="4" width="4" height="4" fill="#00d9ff"/>
  <rect x="18" y="8" width="4" height="4" fill="#00d9ff"/>
  <rect x="18" y="12" width="4" height="4" fill="#00d9ff"/>
  
  <!-- 星星装饰（代表宇宙） -->
  <rect x="22" y="2" width="2" height="2" fill="#ffff00"/>
  <rect x="28" y="6" width="2" height="2" fill="#ff69b4"/>
  <rect x="24" y="18" width="2" height="2" fill="#00ff88"/>
  <rect x="20" y="26" width="2" height="2" fill="#ffff00"/>
  <rect x="28" y="24" width="2" height="2" fill="#ff69b4"/>
</svg>