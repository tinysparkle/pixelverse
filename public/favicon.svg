<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <filter id="cellGlow" x="-5%" y="-5%" width="110%" height="110%">
      <feFlood flood-color="#87CEEB" flood-opacity="0.5" result="glowColor"/>
      <feComposite in="glowColor" in2="SourceGraphic" operator="in" result="maskedGlow"/>
      <feMerge>
        <feMergeNode in="maskedGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="32" height="32" fill="#0A0F14" rx="4"/>
  
  <g transform="translate(6, 4)" filter="url(#cellGlow)">
    <rect width="6" height="24" rx="1" fill="#87CEEB" />
    
    <path d="M6 0 H14 C18 0 20 2 20 6 V10 C20 14 18 16 14 16 H6 V0 Z" fill="#87CEEB" />
    
    <rect x="6" y="5" width="8" height="6" rx="1" fill="#0A0F14" />
  </g>
</svg>
