name = "news-collector"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# Workers AI 绑定
[ai]
binding = "AI"

# 定时向 Pixelverse POST /api/news/ingest（与 NEWS_INGEST_SECRET 一致）
[triggers]
crons = ["*/15 * * * *"]

# 环境变量（部署时通过 wrangler secret 设置）
# SHARED_SECRET — 手动 POST /api/collect 时的 Bearer（本地/调试拉取）
# INGEST_SECRET — 与 Pixelverse 服务端 NEWS_INGEST_SECRET 相同，用于 worker-config / ingest
# PIXELVERSE_BASE_URL — 站点根 URL（如 https://1.2.3.4:3000），供 Cron 回调
#
# wrangler secret put SHARED_SECRET
# wrangler secret put INGEST_SECRET
# （vars 可写公网地址，勿提交生产密钥）
[vars]
PIXELVERSE_BASE_URL = "http://111.228.37.239"
#PIXELVERSE_BASE_URL = "http://127.0.0.1:3000"